<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 50px;
            margin: 0;
        }

        h1 {
            font-size: 80px;
            color: #f00;
        }

        p {
            font-size: 24px;
            margin-bottom: 30px;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        a {
            color: #f00;
            text-decoration: none;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <h1>404</h1>
    <p>Oops! Looks like you're lost.</p>
    <img src="https://example.com/path/to/404-image.jpg" alt="Lost astronaut in space">
    <p>The page you are looking for might have been removed or never existed.</p>
    <p>Let's get you back on track. Go to the <a href="/">home page</a>.</p>
</body>

</html>
